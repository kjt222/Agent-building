<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Game - Doubao Code</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: #fff;
        }

        #game-container {
            text-align: center;
        }

        #score-board {
            font-size: 24px;
            margin-bottom: 10px;
        }

        canvas {
            border: 2px solid #4CAF50;
            background-color: #000;
        }

        #restart-btn {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #restart-btn:hover {
            background-color: #45a049;
        }

        #game-over {
            margin-top: 10px;
            font-size: 28px;
            color: #ff4444;
            display: none;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score-board">Score: <span id="score">0</span></div>
        <canvas id="game-canvas" width="400" height="400"></canvas>
        <div id="game-over">Game Over!</div>
        <button id="restart-btn">Restart Game</button>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('game-over');
        const restartBtn = document.getElementById('restart-btn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake;
        let food;
        let dx, dy;
        let score;
        let gameLoop;
        let gameOver;

        function initGame() {
            snake = [
                { x: 10, y: 10 }
            ];
            food = generateFood();
            dx = 0;
            dy = 0;
            score = 0;
            gameOver = false;
            scoreElement.textContent = score;
            gameOverElement.style.display = 'none';
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, 100);
        }

        function generateFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            return newFood;
        }

        function update() {
            if (gameOver) return;

            // Don't move if dx and dy are both 0
            if (dx === 0 && dy === 0) {
                draw();
                return;
            }

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            // Check self collision
            const eatingFood = head.x === food.x && head.y === food.y;
            // If not eating food, the tail will move away so we can exclude it from check
            const segmentsToCheck = eatingFood ? snake : snake.slice(0, -1);
            if (segmentsToCheck.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            // Check food collision
            if (eatingFood) {
                score++;
                scoreElement.textContent = score;
                food = generateFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw snake
            ctx.fillStyle = '#4CAF50';
            for (const segment of snake) {
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            }

            // Draw food
            ctx.fillStyle = '#ff4444';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function endGame() {
            gameOver = true;
            clearInterval(gameLoop);
            gameOverElement.style.display = 'block';
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (gameOver) return;

            switch (e.key) {
                case 'ArrowUp':
                    if (dy !== 1) {
                        dx = 0;
                        dy = -1;
                    }
                    break;
                case 'ArrowDown':
                    if (dy !== -1) {
                        dx = 0;
                        dy = 1;
                    }
                    break;
                case 'ArrowLeft':
                    if (dx !== 1) {
                        dx = -1;
                        dy = 0;
                    }
                    break;
                case 'ArrowRight':
                    if (dx !== -1) {
                        dx = 1;
                        dy = 0;
                    }
                    break;
            }
        });

        // Restart button
        restartBtn.addEventListener('click', initGame);

        // Start the game
        initGame();
    </script>
</body>
</html>
