<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AURORA LABS - AI Product Guide</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #fff; color: #222; }
    .shell { max-width: 1200px; margin: 0 auto; padding: 48px 24px; }
    .hero { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; }
    .badge { color: #c00; font-weight: 700; font-size: 1rem; }
    h1 { font-size: 2.5rem; margin: 16px 0; }
    .tagline { font-size: 1.25rem; color: #444; margin: 0 0 24px 0; }
    ul { list-style: none; padding: 0; margin: 0 0 32px 0; }
    ul li { padding: 12px 0; font-size: 1.1rem; }
    ul li::before { content: "• "; color: #07564c; font-weight: bold; }
    button { background: #07564c; color: #fff; border: 0; padding: 14px 28px; font-size: 1rem; border-radius: 4px; cursor: pointer; }
    .avatar img { width: 100%; height: auto; display: block; }
    @media (max-width: 768px) {
      .hero { grid-template-columns: 1fr; }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <p class="badge">badge VX-17</p>
        <h1>AURORA LABS</h1>
        <p class="tagline">Your calm AI product guide</p>
        <ul>
          <li>Explains complex workflows clearly</li>
          <li>Keeps tool activity traceable</li>
          <li>Reviews visual details before delivery</li>
        </ul>
        <button>Book a guided demo</button>
      </div>
      <div class="avatar">
        <img src="../avatar_reference.png" alt="Digital human avatar" />
      </div>
    </section>
  </main>
  <script>console.log('ready')</script>
</body>
</html>
