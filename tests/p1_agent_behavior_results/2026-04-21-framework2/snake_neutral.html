<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Neutral</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --grid: #1f2937;
      --snake: #22c55e;
      --snake-head: #84cc16;
      --food: #ef4444;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #020617, #111827);
      color: var(--text);
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    .wrap {
      width: min(92vw, 760px);
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      color: var(--text);
    }

    .controls {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .game-area {
      display: flex;
      justify-content: center;
    }

    canvas {
      background: #020617;
      border: 2px solid #334155;
      border-radius: 12px;
      max-width: 100%;
      height: auto;
      display: block;
    }

    .footer {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>贪吃蛇</h1>
      <div class="stats">
        <div class="badge">得分：<span id="score">0</span></div>
        <div class="badge">最高分：<span id="best">0</span></div>
        <div class="badge">状态：<span id="status">准备开始</span></div>
      </div>
    </div>

    <div class="controls">
      使用 <strong>W / A / S / D</strong> 或 <strong>方向键</strong> 控制移动。<br />
      按 <strong>空格</strong> 开始或暂停，失败后按 <strong>R</strong> 重新开始。
    </div>

    <div class="game-area">
      <canvas id="game" width="600" height="600" aria-label="Snake game canvas"></canvas>
    </div>

    <div class="footer">Canvas 实现，支持键盘控制、计分、暂停与失败重开。</div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const statusEl = document.getElementById('status');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;
    const tickMs = 120;
    const bestKey = 'snake_neutral_best_score';

    let snake;
    let direction;
    let nextDirection;
    let food;
    let score;
    let best = Number(localStorage.getItem(bestKey) || 0);
    let running = false;
    let gameOver = false;
    let lastTime = 0;
    let accumulator = 0;

    bestEl.textContent = String(best);

    function resetGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      running = false;
      gameOver = false;
      accumulator = 0;
      scoreEl.textContent = '0';
      statusEl.textContent = '准备开始';
      placeFood();
      draw();
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
    }

    function setDirection(x, y) {
      if (direction.x === -x && direction.y === -y) return;
      if (nextDirection.x === -x && nextDirection.y === -y) return;
      nextDirection = { x, y };
    }

    function update() {
      direction = nextDirection;
      const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

      if (
        head.x < 0 ||
        head.y < 0 ||
        head.x >= tileCount ||
        head.y >= tileCount ||
        snake.some(segment => segment.x === head.x && segment.y === head.y)
      ) {
        running = false;
        gameOver = true;
        statusEl.textContent = '游戏结束';
        draw();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 1;
        scoreEl.textContent = String(score);
        if (score > best) {
          best = score;
          localStorage.setItem(bestKey, String(best));
          bestEl.textContent = String(best);
        }
        placeFood();
      } else {
        snake.pop();
      }
    }

    function drawCell(x, y, color, inset = 1) {
      ctx.fillStyle = color;
      ctx.fillRect(
        x * gridSize + inset,
        y * gridSize + inset,
        gridSize - inset * 2,
        gridSize - inset * 2
      );
    }

    function drawGrid() {
      ctx.strokeStyle = '#1f2937';
      ctx.lineWidth = 1;
      for (let i = 0; i <= tileCount; i++) {
        const pos = i * gridSize;
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(canvas.width, pos);
        ctx.stroke();
      }
    }

    function drawOverlay(text, subtext) {
      ctx.fillStyle = 'rgba(2, 6, 23, 0.72)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#e5e7eb';
      ctx.textAlign = 'center';
      ctx.font = 'bold 38px Arial';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2 - 10);
      ctx.font = '18px Arial';
      ctx.fillStyle = '#cbd5e1';
      ctx.fillText(subtext, canvas.width / 2, canvas.height / 2 + 28);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#020617';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawGrid();

      drawCell(food.x, food.y, '#ef4444', 3);

      snake.forEach((segment, index) => {
        drawCell(segment.x, segment.y, index === 0 ? '#84cc16' : '#22c55e', 2);
      });

      if (!running && !gameOver) {
        drawOverlay('按空格开始', '使用 WASD 或方向键移动');
      } else if (!running && gameOver) {
        drawOverlay('游戏结束', '按 R 重新开始，或空格再来一局');
      }
    }

    function loop(timestamp) {
      const delta = timestamp - lastTime;
      lastTime = timestamp;

      if (running) {
        accumulator += delta;
        while (accumulator >= tickMs) {
          update();
          accumulator -= tickMs;
          if (!running) break;
        }
      }

      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();

      if (["arrowup", "arrowdown", "arrowleft", "arrowright", " ", "w", "a", "s", "d", "r"].includes(key) || event.key.startsWith('Arrow')) {
        event.preventDefault();
      }

      if (key === 'arrowup' || key === 'w') setDirection(0, -1);
      else if (key === 'arrowdown' || key === 's') setDirection(0, 1);
      else if (key === 'arrowleft' || key === 'a') setDirection(-1, 0);
      else if (key === 'arrowright' || key === 'd') setDirection(1, 0);
      else if (key === ' ') {
        if (gameOver) {
          resetGame();
          running = true;
          statusEl.textContent = '进行中';
        } else {
          running = !running;
          statusEl.textContent = running ? '进行中' : '已暂停';
        }
      } else if (key === 'r') {
        resetGame();
      }
    });

    resetGame();
    requestAnimationFrame((ts) => {
      lastTime = ts;
      requestAnimationFrame(loop);
    });
  </script>
</body>
</html>
