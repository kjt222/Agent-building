<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    :root {
      --bg: #0f1220;
      --panel: #171b2e;
      --grid: #202744;
      --snake: #4ade80;
      --snake-head: #22c55e;
      --food: #f43f5e;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #60a5fa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, #1b2140 0%, #0f1220 45%, #0a0d18 100%);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    .game-shell {
      width: min(92vw, 560px);
      background: rgba(23, 27, 46, 0.95);
      border: 1px solid #2a3358;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .scoreboard {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      background: #11162a;
      border: 1px solid #2a3358;
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 0.95rem;
    }

    .badge span {
      color: var(--accent);
      font-weight: 700;
    }

    .board-wrap {
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      background:
        linear-gradient(0deg, transparent 24%, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.03) 26%, transparent 27%, transparent 74%, rgba(255,255,255,0.03) 75%, rgba(255,255,255,0.03) 76%, transparent 77%, transparent),
        linear-gradient(90deg, transparent 24%, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.03) 26%, transparent 27%, transparent 74%, rgba(255,255,255,0.03) 75%, rgba(255,255,255,0.03) 76%, transparent 77%, transparent),
        var(--grid);
      border: 1px solid #2a3358;
      border-radius: 14px;
      image-rendering: pixelated;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(8, 10, 20, 0.68);
      border-radius: 14px;
      text-align: center;
      padding: 20px;
    }

    .overlay.show {
      display: grid;
    }

    .panel {
      background: rgba(17, 22, 42, 0.92);
      border: 1px solid #33406e;
      border-radius: 16px;
      padding: 20px 18px;
      width: min(90%, 340px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 1.6rem;
    }

    .panel p {
      margin: 8px 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .btn {
      margin-top: 14px;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover {
      filter: brightness(1.08);
    }

    .controls {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
      text-align: center;
    }

    .controls kbd {
      background: #0e1325;
      border: 1px solid #31406c;
      border-bottom-width: 3px;
      border-radius: 6px;
      padding: 2px 7px;
      color: var(--text);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <div class="topbar">
      <div class="title">Snake</div>
      <div class="scoreboard">
        <div class="badge">Score: <span id="score">0</span></div>
        <div class="badge">Best: <span id="best">0</span></div>
      </div>
    </div>

    <div class="board-wrap">
      <canvas id="game" width="500" height="500" aria-label="Snake game board"></canvas>

      <div id="startOverlay" class="overlay show">
        <div class="panel">
          <h2>Snake Game</h2>
          <p>Eat food, grow longer, and avoid walls and yourself.</p>
          <p>Press an arrow key or WASD to begin.</p>
          <button id="startBtn" class="btn">Start Game</button>
        </div>
      </div>

      <div id="gameOverOverlay" class="overlay">
        <div class="panel">
          <h2>Game Over</h2>
          <p>Your score: <strong id="finalScore">0</strong></p>
          <p>Press <kbd>R</kbd> or use the button below to restart.</p>
          <button id="restartBtn" class="btn">Restart</button>
        </div>
      </div>
    </div>

    <div class="controls">
      Controls:
      <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd>
      or
      <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd>
      &nbsp;•&nbsp;
      Restart: <kbd>R</kbd>
    </div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      const scoreEl = document.getElementById("score");
      const bestEl = document.getElementById("best");
      const finalScoreEl = document.getElementById("finalScore");

      const startOverlay = document.getElementById("startOverlay");
      const gameOverOverlay = document.getElementById("gameOverOverlay");
      const startBtn = document.getElementById("startBtn");
      const restartBtn = document.getElementById("restartBtn");

      const gridSize = 20;
      const tileCount = canvas.width / gridSize;
      const initialSpeed = 130;
      const minSpeed = 65;

      let snake;
      let direction;
      let nextDirection;
      let food;
      let score;
      let bestScore = Number(localStorage.getItem("snake-best-score") || 0);
      let gameLoop = null;
      let running = false;
      let started = false;
      let speed = initialSpeed;

      bestEl.textContent = bestScore;

      function initGame() {
        snake = [
          { x: 10, y: 10 },
          { x: 9, y: 10 },
          { x: 8, y: 10 }
        ];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        score = 0;
        speed = initialSpeed;
        running = false;
        started = false;
        scoreEl.textContent = score;
        food = randomFoodPosition();
        finalScoreEl.textContent = "0";
        clearLoop();
        draw();
      }

      function clearLoop() {
        if (gameLoop) {
          clearInterval(gameLoop);
          gameLoop = null;
        }
      }

      function startGame() {
        if (running) return;
        started = true;
        running = true;
        startOverlay.classList.remove("show");
        gameOverOverlay.classList.remove("show");
        clearLoop();
        gameLoop = setInterval(tick, speed);
      }

      function restartGame() {
        initGame();
        startOverlay.classList.remove("show");
        gameOverOverlay.classList.remove("show");
        startGame();
      }

      function setSpeed(newSpeed) {
        speed = Math.max(minSpeed, newSpeed);
        if (running) {
          clearLoop();
          gameLoop = setInterval(tick, speed);
        }
      }

      function randomFoodPosition() {
        let pos;
        do {
          pos = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
          };
        } while (snake && snake.some(seg => seg.x === pos.x && seg.y === pos.y));
        return pos;
      }

      function tick() {
        direction = nextDirection;

        const head = {
          x: snake[0].x + direction.x,
          y: snake[0].y + direction.y
        };

        if (
          head.x < 0 ||
          head.y < 0 ||
          head.x >= tileCount ||
          head.y >= tileCount ||
          snake.some(seg => seg.x === head.x && seg.y === head.y)
        ) {
          endGame();
          return;
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
          score++;
          scoreEl.textContent = score;
          food = randomFoodPosition();
          if (score > bestScore) {
            bestScore = score;
            bestEl.textContent = bestScore;
            localStorage.setItem("snake-best-score", String(bestScore));
          }
          setSpeed(speed - 3);
        } else {
          snake.pop();
        }

        draw();
      }

      function endGame() {
        running = false;
        clearLoop();
        finalScoreEl.textContent = score;
        gameOverOverlay.classList.add("show");
      }

      function drawCell(x, y, color, radius = 4) {
        const px = x * gridSize;
        const py = y * gridSize;
        ctx.fillStyle = color;
        roundRect(ctx, px + 1, py + 1, gridSize - 2, gridSize - 2, radius);
        ctx.fill();
      }

      function drawFood() {
        const cx = food.x * gridSize + gridSize / 2;
        const cy = food.y * gridSize + gridSize / 2;
        const r = gridSize * 0.34;

        ctx.fillStyle = "#f43f5e";
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#fecdd3";
        ctx.beginPath();
        ctx.arc(cx - 3, cy - 3, r * 0.35, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawSnake() {
        snake.forEach((seg, index) => {
          const isHead = index === 0;
          drawCell(seg.x, seg.y, isHead ? "#22c55e" : "#4ade80", isHead ? 6 : 5);

          if (isHead) {
            const px = seg.x * gridSize;
            const py = seg.y * gridSize;
            const eyeOffsetX = direction.x !== 0 ? (direction.x > 0 ? 13 : 7) : 7;
            const eyeOffsetY1 = direction.y !== 0 ? (direction.y > 0 ? 13 : 7) : 7;
            const eyeOffsetY2 = direction.y !== 0 ? (direction.y > 0 ? 13 : 7) : 13;

            ctx.fillStyle = "#0b0f1a";

            if (direction.x !== 0) {
              ctx.beginPath();
              ctx.arc(px + eyeOffsetX, py + 7, 2, 0, Math.PI * 2);
              ctx.arc(px + eyeOffsetX, py + 13, 2, 0, Math.PI * 2);
              ctx.fill();
            } else {
              ctx.beginPath();
              ctx.arc(px + 7, py + eyeOffsetY1, 2, 0, Math.PI * 2);
              ctx.arc(px + 13, py + eyeOffsetY2, 2, 0, Math.PI * 2);
              ctx.fill();
            }
          }
        });
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawFood();
        drawSnake();
      }

      function roundRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + width, y, x + width, y + height, radius);
        ctx.arcTo(x + width, y + height, x, y + height, radius);
        ctx.arcTo(x, y + height, x, y, radius);
        ctx.arcTo(x, y, x + width, y, radius);
        ctx.closePath();
      }

      function updateDirection(newDir) {
        if (!started) {
          startGame();
        }

        const isReverse =
          newDir.x === -direction.x && newDir.y === -direction.y;

        if (isReverse) return;

        nextDirection = newDir;
      }

      document.addEventListener("keydown", (e) => {
        const key = e.key.toLowerCase();

        if (["arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d", "r", " "].includes(key)) {
          e.preventDefault();
        }

        switch (key) {
          case "arrowup":
          case "w":
            updateDirection({ x: 0, y: -1 });
            break;
          case "arrowdown":
          case "s":
            updateDirection({ x: 0, y: 1 });
            break;
          case "arrowleft":
          case "a":
            updateDirection({ x: -1, y: 0 });
            break;
          case "arrowright":
          case "d":
            updateDirection({ x: 1, y: 0 });
            break;
          case "r":
            restartGame();
            break;
          case " ":
            if (!started) startGame();
            break;
        }
      });

      startBtn.addEventListener("click", () => {
        if (!started) {
          startGame();
        }
      });

      restartBtn.addEventListener("click", restartGame);

      initGame();
      startOverlay.classList.add("show");
    })();
  </script>
</body>
</html>
